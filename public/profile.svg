<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="150" cy="150" r="150"/>
    </clipPath>
  </defs>
  <circle cx="150" cy="150" r="150" fill="url(#bg)"/>
  <!-- Body -->
  <ellipse cx="150" cy="230" rx="70" ry="50" fill="url(#accent)" opacity="0.6"/>
  <!-- Head -->
  <circle cx="150" cy="118" r="46" fill="url(#accent)" opacity="0.85"/>
  <!-- Initials -->
  <text x="150" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="white" opacity="0.95">RH</text>
</svg>
